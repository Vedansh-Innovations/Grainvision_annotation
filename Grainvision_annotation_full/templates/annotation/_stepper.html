<div class="stepper">
  <div class="step {% if step == 1 %}active{% elif step > 1 %}done{% endif %}">
    <span class="num">{% if step > 1 %}✓{% else %}1{% endif %}</span> Capture
  </div>
  <div class="bar"></div>
  <div class="step {% if step == 2 %}active{% elif step > 2 %}done{% endif %}">
    <span class="num">{% if step > 2 %}✓{% else %}2{% endif %}</span> Measurements
  </div>
  <div class="bar"></div>
  <div class="step {% if step == 3 %}active{% elif step > 3 %}done{% endif %}">
    <span class="num">{% if step > 3 %}✓{% else %}3{% endif %}</span> Annotate
  </div>
  <div class="bar"></div>
  <div class="step {% if step == 4 %}active{% endif %}">
    <span class="num">4</span> Submit
  </div>
</div>
